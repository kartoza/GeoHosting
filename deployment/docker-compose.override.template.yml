version: '3.9'
services:
  redis:
    volumes:
      - ./volumes/redis:/data
  db:
    volumes:
      - ./volumes/database:/opt/postgres/data

  django:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
      target: prod
    volumes:
      - ../django_project:/home/web/django_project
      - ../kartoza-cloudbench:/home/web/kartoza-cloudbench
      - ./volumes/static:/home/web/static
      - ./volumes/media:/home/web/media
      - ./volumes/cloudbench:/home/web/cloudbench_data

  worker:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
    volumes:
      - ../django_project:/home/web/django_project
      - ../kartoza-cloudbench:/home/web/kartoza-cloudbench
      - ./volumes/static:/home/web/static
      - ./volumes/media:/home/web/media
      - ./volumes/cloudbench:/home/web/cloudbench_data

  celery_beat:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
    volumes:
      - ../django_project:/home/web/django_project
      - ../kartoza-cloudbench:/home/web/kartoza-cloudbench
      - ./volumes/static:/home/web/static
      - ./volumes/media:/home/web/media
      - ./volumes/cloudbench:/home/web/cloudbench_data

  nginx:
    volumes:
      - ./nginx/sites-enabled:/etc/nginx/conf.d:ro
      - ./volumes/static:/home/web/static
      - ./volumes/media:/home/web/media
    ports:
      - "${HTTP_PORT:-8888}:80"
    links:
      - django

  webpack:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
      target: dev
    image: kartoza/${COMPOSE_PROJECT_NAME:-django_project}_dev
    volumes:
      - ../django_project:/home/web/django_project
      - ./volumes/static:/home/web/static
    working_dir: /home/web/django_project/geohosting
    command: sh -c "npm install && npm run serve"
    entrypoint: [ ]
    ports:
      - "9000:9000"
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:9000" ]
      interval: 5s
      timeout: 2s
      retries: 200
      start_period: 5s

  webpack_cloudbench:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
      target: dev
    image: kartoza/${COMPOSE_PROJECT_NAME:-django_project}_dev
    volumes:
      - ../kartoza-cloudbench:/home/web/kartoza-cloudbench
    working_dir: /home/web/kartoza-cloudbench/web
    command: sh -c "npm install && VITE_BASE_URL=/cloudbench/ VITE_API_BASE=/api/cloudbench npm run dev -- --host 0.0.0.0"
    entrypoint: [ ]
    ports:
      - "5173:5173"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5173" ]
      interval: 5s
      timeout: 2s
      retries: 200
      start_period: 10s

  dev:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
      target: dev
    image: kartoza/${COMPOSE_PROJECT_NAME:-django_project}_dev
    volumes:
      - ../django_project:/home/web/django_project
      - ../kartoza-cloudbench:/home/web/kartoza-cloudbench
      - ./volumes/static:/home/web/static
      - ./volumes/media:/home/web/media
      - ./volumes/cloudbench/config:/home/web/cloudbench_data/config
      - ./volumes/cloudbench/data:/home/web/cloudbench_data/data
      - ./volumes/cloudbench/cache:/home/web/cloudbench_data/cache
    environment:
      # editable in .env
      - DATABASE_NAME=${DATABASE_NAME:-django}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-docker}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-docker}
      - DATABASE_HOST=${DATABASE_HOST:-db}
      - DJANGO_SETTINGS_MODULE=core.settings.dev

      # Email where alters should be sent. This will be used by let's encrypt and as the django admin email.
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ERPNEXT_API_KEY=${ERPNEXT_API_KEY:-erpnext_api_key}
      - ERPNEXT_API_SECRET=${ERPNEXT_API_SECRET:-erpnext_api_secret}
      - ERPNEXT_BASE_URL=${ERPNEXT_BASE_URL:-erpnext_base_url}
      - SECRET_KEY=SECRET_KEY

      # REDIS CONFIG
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_password

      # CLOUDBENCH
      - WEBPACK_CLOUDBENCH_SERVER_URL=http://webpack_cloudbench:5173
      - CLOUDBENCH_PATH=/home/web/kartoza-cloudbench
      - CLOUDBENCH_DATA_FOLDER=${CLOUDBENCH_DATA_FOLDER:-/home/web/cloudbench_data}
    ports:
      # for django test server
      - "9200:8080"
      # for ssh
      - "9201:22"
    links:
      - db
      - redis
      - worker
      - webpack
      - webpack_cloudbench
    entrypoint: [ ]
    depends_on:
      webpack:
        condition: service_healthy
      webpack_cloudbench:
        condition: service_healthy
